/* ====== 刷真题样式 ====== */
.exam-filters{max-width:1100px;margin:16px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.filter-group{display:flex;gap:4px;background:#ffffff;border-radius:8px;padding:3px;border:1px solid #d0c8bc}
.filter-btn{padding:7px 15px;border:none;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s;background:transparent;color:#888}
.filter-btn:hover{background:#e8e4de;color:#2c5282}
.filter-btn.active{background:#2c5282;color:#fff}
.exam-container{max-width:1100px;margin:16px auto;padding:0 20px;display:flex;gap:16px}

.section-link{display:block;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#888;transition:all .15s;margin-bottom:1px;text-decoration:none}
.section-link:hover{background:#e8e4de;color:#2c5282}
.section-link.active{background:#e0d8cc;color:#2c5282;font-weight:600}
.section-link .badge{float:right;font-size:10px;background:#d0c8bc;padding:1px 6px;border-radius:8px;color:#777}
.exam-main{flex:1;min-width:0}
.card{background:#ffffff;border-radius:10px;padding:28px 32px;margin-bottom:16px;border:1px solid #d0c8bc}
.card h2{font-size:18px;color:#2c5282;margin-bottom:6px;padding-bottom:10px;border-bottom:1px solid #d0c8bc}
.card .passage-title{font-size:13px;color:#888;margin-bottom:16px}
.passage{font-family:'Times New Roman',serif;font-size:15px;line-height:2;color:#333;margin-bottom:20px;text-align:justify}
.passage p{margin-bottom:12px;text-indent:2em}
.passage .word{cursor:pointer;transition:all .15s;border-bottom:1px dashed transparent;position:relative}
.passage .word:hover{border-bottom-color:#2c5282;color:#2c5282}
.passage .word.highlighted{background:#fff59d;border-radius:2px;padding:0 1px;border-bottom:2px solid #f9a825}
.questions{margin-top:16px}
.question{margin-bottom:16px;padding:14px;background:#f8f6f3;border-radius:8px;border-left:3px solid #d0c8bc;transition:all .2s}
.question:hover{border-left-color:#2c5282}
.question .q-num{font-weight:700;color:#2c5282;margin-right:6px}
.question .q-text{font-size:14px;line-height:1.7}
.options{margin-top:8px;display:grid;gap:5px}
.option{padding:8px 12px;background:#ffffff;border-radius:6px;cursor:pointer;font-size:13px;border:1px solid #d0c8bc;transition:all .15s}
.option:hover{border-color:#2c5282;background:#f0ede8}
.option.correct{border-color:#2e7d32;background:#e8f0e8;color:#2e7d32}
.btn-toggle-answer{display:inline-block;margin-top:10px;padding:7px 18px;background:#2c5282;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.btn-toggle-answer:hover{background:#1a3a5c}

/* 翻译弹窗 */
.tooltip{position:fixed;z-index:9999;background:#2c5282;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;max-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s}
.tooltip.show{opacity:1;transform:translateY(0)}
.tooltip .word-orig{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.tooltip .meaning{font-size:12px;color:#e0e0e0;line-height:1.5}

.sentence-popup.show{display:block}
.sp-header{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:#2c5282;color:#fff;font-size:14px;font-weight:600}
.sp-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.sp-original{padding:14px 18px;font-size:14px;line-height:1.7;color:#333;background:#f8f6f3;border-bottom:1px solid #d0c8bc;font-family:'Times New Roman',serif}
.sp-translated{padding:14px 18px;font-size:14px;line-height:1.7;color:#2c5282;min-height:36px}
.sp-actions{display:flex;gap:8px;padding:10px 18px;border-top:1px solid #d0c8bc}
.sp-btn{flex:1;padding:7px;border:1px solid #d0c8bc;border-radius:6px;background:#ffffff;cursor:pointer;font-size:12px;color:#555;transition:all .15s}
.sp-btn:hover{background:#e0d8cc;border-color:#2c5282;color:#2c5282}
/* 生词面板 */
.highlight-panel{position:fixed;right:8px;bottom:8px;width:240px;background:#ffffff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:9999;overflow:hidden;max-height:360px;display:flex;flex-direction:column;border:1px solid #d0c8bc}
.hp-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#2c5282;color:#fff;font-size:13px;font-weight:600}
.hp-toggle{background:none;border:none;color:#fff;font-size:16px;cursor:pointer}
.hp-list{padding:6px;overflow-y:auto;flex:1;max-height:220px}
.hp-list .hp-word{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;margin:2px 0;border-radius:5px;background:#f8f6f3;font-size:12px;cursor:pointer}
.hp-list .hp-word:hover{background:#e0d8cc}
.hp-list .hp-remove{color:#999;cursor:pointer;font-size:14px}
.hp-list .hp-remove:hover{color:#c44536}
.hp-actions{display:flex;gap:4px;padding:6px;border-top:1px solid #d0c8bc}
.hp-btn{flex:1;padding:5px;border:none;border-radius:5px;background:#f8f6f3;cursor:pointer;font-size:10px;color:#777;transition:all .15s}
.hp-btn:hover{background:#2c5282;color:#fff}

/* ====== 背单词样式 ====== */
.vocab-container{display:none;flex-direction:column;align-items:center;padding:20px}
.vocab-container.show{display:flex}
.vocab-stats{display:flex;gap:16px;margin:10px 0 16px;flex-wrap:wrap;justify-content:center}
.vocab-stat{background:#ffffff;border-radius:8px;padding:10px 20px;text-align:center;min-width:70px;border:1px solid #d0c8bc}
.vocab-stat .num{font-size:22px;font-weight:700;color:#c44536}
.vocab-stat .lbl{font-size:10px;color:#888;margin-top:2px}
.vocab-progress{width:380px;max-width:90vw;height:3px;background:#ffffff;border-radius:2px;margin:0 auto 8px;overflow:hidden}

.vocab-search{width:380px;max-width:90vw;margin:0 auto 12px}

.vocab-search input:focus{border-color:#2c5282}
.card-container{perspective:1000px;width:360px;max-width:90vw;height:260px;margin:8px auto 16px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.card-container.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card-front{background:linear-gradient(145deg,#ffffff,#1e3248);border:1px solid #d0c8bc}
.card-back{background:linear-gradient(145deg,#e8f0e8,#d0e0d0);border:1px solid #3a6a3a;transform:rotateY(180deg)}
.card-front .word{font-size:40px;font-weight:700;color:#333;letter-spacing:1px;margin-bottom:8px}
.card-front .hint{font-size:11px;color:#aaa;margin-top:16px}
.card-back .word{font-size:20px;color:#2e7d32;margin-bottom:12px}
.card-back .meaning{font-size:18px;color:#333;text-align:center;line-height:1.7}
.vocab-btns{display:flex;gap:10px;margin:8px 0 16px;flex-wrap:wrap;justify-content:center}
.vocab-btn{padding:8px 20px;border:none;border-radius:7px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:600}
.v-btn-red{background:#c44536;color:#fff}.v-btn-red:hover{background:#a0302a}
.v-btn-green{background:#2e7d32;color:#fff}.v-btn-green:hover{background:#1b5e20}
.v-btn-blue{background:#2c5282;color:#fff}.v-btn-blue:hover{background:#1a3a5c}
.v-btn-gray{background:#e8e4de;color:#888}.v-btn-gray:hover{background:#2c5282;color:#fff}
.v-btn-outline{background:transparent;border:1px solid #d0c8bc;color:#777}.v-btn-outline:hover{border-color:#2c5282;color:#2c5282}
.vocab-list{width:100%;max-width:650px;margin:16px auto;display:none}
.vocab-list.show{display:block}
.vocab-list table{width:100%;border-collapse:collapse;font-size:13px}
.vocab-list th{background:#ffffff;padding:10px 14px;text-align:left;color:#2c5282;position:sticky;top:0}
.vocab-list td{padding:8px 14px;border-bottom:1px solid #ffffff}
.vocab-list tr:hover{background:#ffffff}
.vocab-list .known{color:#2e7d32}
.vocab-list .unknown{color:#c44536}

/* ====== 反馈弹窗 ====== */
#feedbackModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:99999;justify-content:center;align-items:center}
#feedbackModal .fb-inner{background:#ffffff;border-radius:12px;padding:28px;width:400px;max-width:90vw;border:1px solid #d0c8bc}

#feedbackModal textarea{width:100%;border:1px solid #d0c8bc;border-radius:7px;padding:10px;font-size:13px;resize:vertical;background:#f5f0eb;color:#999}
#feedbackModal .fb-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
#feedbackModal .fb-btns button{padding:7px 18px;border:none;border-radius:6px;cursor:pointer;font-size:12px}
#feedbackModal .fb-cancel{background:#e8e4de;color:#888}
#feedbackModal .fb-submit{background:#2c5282;color:#fff}

/* 响应式 */
@media(max-width:768px){
  .exam-container{flex-direction:column}
  .exam-sidebar{width:100%}
  .exam-sidebar-inner{position:static;display:flex;gap:6px;overflow-x:auto}
  .exam-sidebar h3{display:none}
  .section-link{white-space:nowrap;flex-shrink:0}
  .card{padding:18px}
}
</style>
</head>

const EXAM_DATA={cet6:{
  "2025-12": {
    writing: {
      title: "Part I Writing (30 minutes)",
      directions: "Write an essay on \"Teachers are pivotal guides in students' academic and personal growth\". 150-200 words.",
      sample: "Teachers play a uniquely influential role that extends far beyond the transmission of academic knowledge. They serve simultaneously as mentors, role models, and guides who shape not only what students learn but who they become.\n\nIn the academic realm, a skilled teacher does more than deliver curriculum content. They ignite intellectual curiosity, teaching students how to think critically rather than what to think. The best teachers create environments where questions are welcomed, mistakes are viewed as learning opportunities, and intellectual growth is celebrated.\n\nBeyond academics, teachers profoundly influence personal development. They model integrity, perseverance, and empathy through their daily interactions. A teacher who genuinely listens to a struggling student, who offers encouragement during moments of doubt, can fundamentally alter that young person's self-perception and life trajectory.\n\nIn conclusion, teachers are far more than conveyors of information. They are architects of human potential whose influence ripples through generations.",
    },
    translation: {
      title: "Part IV Translation (30 minutes)",
      directions: "将以下段落翻译成英文",
      chinese: "尊老是中华民族的传统美德，深深植根于中国人的思想和行为中。在当今的中国，这种美德得到广泛传承。社会各界积极营造敬老助老的社会氛围，为老年人提供便利服务已成为社会共识。政府还出台了一系列政策，为老年人的权益提供有力保障。",

function renderPassageWithClickableWords(text){
  if(!text)return'';
  return text.split(/([a-zA-Z]+(?:[-'][a-zA-Z]+)*)/).map(part=>{
    if(/^[a-zA-Z]/.test(part)&&part.length>=2){return`<span class="word" data-word="${part}">${part}</span>`}
    return part.replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }).join('')
}

async function translateWord(word){
  const clean=word.toLowerCase().replace(/[^a-z-]/g,'');
  if(!clean||clean.length<2)return null;
  if(LOCAL_DICT[clean])return{word:clean,meaning:LOCAL_DICT[clean]};
  if(DICT_CACHE[clean])return DICT_CACHE[clean];
  try{
    const r=await fetch(`https://fanyi.youdao.com/translate?&doctype=json&type=EN2ZH_CN&i=${encodeURIComponent(clean)}`);
    const d=await r.json();const zh=d.translateResult?.[0]?.[0]?.tgt||'';
    if(zh&&zh!==clean){const res={word:clean,meaning:zh};DICT_CACHE[clean]=res;return res}
  }catch(e){}
  return null
}

function showTooltip(e,data){
  if(!data)return;ttWord.textContent=data.word;ttMeaning.textContent=data.meaning;
  tooltip.classList.add('show');tooltip.style.left=Math.min(e.clientX+16,window.innerWidth-270)+'px';tooltip.style.top=Math.min(e.clientY-10,window.innerHeight-80)+'px'
}
function hideTooltip(){tooltip.classList.remove('show')}

function toggleHighlight(word,el){
  const key=word.toLowerCase();
  if(highlightedWords[key]){delete highlightedWords[key];el.classList.remove('highlighted')}
  else{highlightedWords[key]=word;el.classList.add('highlighted')}
  localStorage.setItem('cet_highlights',JSON.stringify(highlightedWords));updateHPanel()
}

function updateHPanel(){
  const list=document.getElementById('hpList'),words=Object.keys(highlightedWords);
  document.getElementById('hpCount').textContent=`(${words.length})`;
  list.innerHTML=words.map(w=>`<div class="hp-word"><span>${highlightedWords[w]}</span><span class="hp-remove" onclick="event.stopPropagation();removeHL('${w}')">×</span></div>`).join('')||'<div style="color:#888;font-size:11px;padding:8px;text-align:center">点击文章中的单词来添加生词</div>'
}
function removeHL(key){delete highlightedWords[key];localStorage.setItem('cet_highlights',JSON.stringify(highlightedWords));updateHPanel();renderAll()}
function clearHighlights(){highlightedWords={};localStorage.removeItem('cet_highlights');updateHPanel();renderAll()}
function exportWordList(){
  const w=Object.entries(highlightedWords).map(([k,v])=>`${v}`).join('\n');
  const b=new Blob([w],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='生词本.txt';a.click()
}

async function translateSentence(text){
  const clean=text.trim().replace(/\s+/g,' ');if(!clean||clean.length<5)return;
  spOriginal.textContent=clean;spTranslated.textContent='翻译中...';sentencePopup.classList.add('show');lastSelectedText=clean;
  try{const r=await fetch(`https://fanyi.youdao.com/translate?&doctype=json&type=EN2ZH_CN&i=${encodeURIComponent(clean)}`);const d=await r.json();spTranslated.textContent=d.translateResult?.[0]?.[0]?.tgt||''}
  catch(e){spTranslated.textContent='网络错误，请检查连接'}
}
function closeSentencePopup(){sentencePopup.classList.remove('show')}
function speakSentence(){if(!lastSelectedText)return;const u=new SpeechSynthesisUtterance(lastSelectedText);u.lang='en-US';u.rate=.9;speechSynthesis.speak(u)}
function copySentence(){navigator.clipboard.writeText(spTranslated.textContent).then(()=>{const b=document.querySelector('.sp-btn:last-child');b.textContent='已复制!';setTimeout(()=>b.textContent='复制译文',1500)})}

function renderSection(sectionKey){
  const data=EXAM_DATA[state.examType][state.year];if(!data)return'<div class="card"><p>暂无该年份真题数据</p></div>';
  const section=data[sectionKey];if(!section)return'<div class="card"><p>暂无该部分数据</p></div>';
  let html='';
  if(sectionKey==='writing'){
    html+=`<div class="card"><h2>${section.title}</h2><p style="color:#c44536;font-weight:600;margin-bottom:16px">${section.directions}</p><p style="font-weight:700;margin:14px 0 8px;color:#2c5282">参考范文：</p><div class="passage">${section.sample.split('\n\n').map(p=>`<p>${renderPassageWithClickableWords(p)}</p>`).join('')}</div></div>`
  }else if(sectionKey==='translation'){
    html+=`<div class="card"><h2>${section.title}</h2><p style="color:#c44536;font-weight:600;margin-bottom:16px">${section.directions}</p><div style="background:#f8f6f3;padding:16px;border-radius:8px;margin-bottom:16px"><p style="font-weight:700;color:#2c5282;margin-bottom:6px">中文原文：</p><p style="font-size:15px;line-height:2">${section.chinese}</p></div>`;
    if(state.showAnswers){html+=`<div style="background:#e8f0e8;padding:16px;border-radius:8px"><p style="font-weight:700;color:#2e7d32;margin-bottom:6px">参考译文：</p><p style="font-size:14px;line-height:2">${renderPassageWithClickableWords(section.english)}</p></div>`}
    html+=`<button class="btn-toggle-answer" onclick="toggleAnswers()">${state.showAnswers?'隐藏译文':'显示参考译文'}</button></div>`
  }else if(sectionKey==='reading3'||sectionKey==='reading3b'){
    html+=`<div class="card"><h2>${section.title}</h2><p class="passage-title">${section.passageTitle}</p><div class="passage">${section.passage.split('\n\n').map(p=>`<p>${renderPassageWithClickableWords(p)}</p>`).join('')}</div><div class="questions"><h3 style="margin-bottom:10px">Questions:</h3>`;
    section.questions.forEach((q,qi)=>{html+=`<div class="question"><p class="q-text"><span class="q-num">${qi+1}.</span>${q.q}</p><div class="options">${q.opts.map((o,oi)=>{let cls='option';if(state.showAnswers&&oi===q.ans)cls+=' correct';return`<div class="${cls}">${o}</div>`}).join('')}</div></div>`});
    html+=`</div><button class="btn-toggle-answer" onclick="toggleAnswers()">${state.showAnswers?'隐藏答案':'显示答案'}</button>`;
    if(state.showAnswers){html+=`<div style="margin-top:12px;padding:12px 16px;background:#e8f0e8;border-radius:8px"><span style="font-weight:700;color:#2e7d32">参考答案：</span><br>`;section.questions.forEach((q,qi)=>{html+=`第${qi+1}题: ${String.fromCharCode(65+q.ans)}<br>`});html+=`</div>`}
    html+=`</div>`
  }
  return html
}

function renderAll(){
  document.getElementById('examMain').innerHTML=renderSection(state.section);
  document.querySelectorAll('.word').forEach(el=>{
    const word=el.dataset.word;if(!word)return;
    if(highlightedWords[word.toLowerCase()])el.classList.add('highlighted');
    el.addEventListener('mouseenter',async(e)=>{el.classList.add('highlight');const data=await translateWord(word);showTooltip(e,data)});
    el.addEventListener('mouseleave',()=>{el.classList.remove('highlight');hideTooltip()});
    el.addEventListener('click',(e)=>{e.stopPropagation();toggleHighlight(word,el)})
  });
  updateHPanel()
}

function toggleAnswers(){state.showAnswers=!state.showAnswers;renderAll()}

document.querySelectorAll('#yearFilter .filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#yearFilter .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.year=btn.dataset.year;state.showAnswers=false;renderAll()})});
document.querySelectorAll('#sidebarNav .section-link').forEach(link=>{link.addEventListener('click',(e)=>{e.preventDefault();document.querySelectorAll('#sidebarNav .section-link').forEach(l=>l.classList.remove('active'));link.classList.add('active');state.section=link.dataset.section;state.showAnswers=false;renderAll()})});
document.addEventListener('dblclick',(e)=>{const sel=window.getSelection().toString().trim();if(sel&&sel.split(' ').length>=2)translateSentence(sel)});
document.addEventListener('click',(e)=>{if(!e.target.closest('.word'))hideTooltip()});
document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){closeSentencePopup();hideTooltip()}});
document.getElementById('feedbackModal').addEventListener('click',function(e){if(e.target===this)closeFeedback()});

function openFeedback(){document.getElementById('feedbackModal').style.display='flex'}
function closeFeedback(){document.getElementById('feedbackModal').style.display='none';document.getElementById('fbMsg').style.display='none'}
function submitFeedback(){
  const text=document.getElementById('fbText').value.trim();if(!text)return;
  const issues=JSON.parse(localStorage.getItem('cet_feedback')||'[]');
  issues.push({text,time:new Date().toISOString(),page:state.section,year:state.year});
  localStorage.setItem('cet_feedback',JSON.stringify(issues));document.getElementById('fbText').value='';
  const msg=document.getElementById('fbMsg');msg.style.display='block';msg.style.color='#2e7d32';msg.textContent='已保存！感谢反馈（共'+issues.length+'条）';setTimeout(closeFeedback,1500)
}

let vWords=[...VWORDS],vIdx=0,vKnown=new Set(JSON.parse(localStorage.getItem('cet6_vknow')||'[]')),vFilterText='';

function vSave(){localStorage.setItem('cet6_vknow',JSON.stringify([...vKnown]))}
function vFiltered(){return vFilterText?vWords.filter(w=>w.w.toLowerCase().includes(vFilterText)||w.m.includes(vFilterText)):vWords}
function vRender(){
  const f=vFiltered();if(!f.length){document.getElementById('vWord').textContent='无结果';return}
  const w=f[vIdx%f.length];document.getElementById('vWord').textContent=w.w;document.getElementById('vWordBack').textContent=w.w;document.getElementById('vMeaning').textContent=w.m;
  document.getElementById('vCard').classList.remove('flipped');vUpdateStats()
}
function vUpdateStats(){
  const t=vWords.length,k=vKnown.size,r=t-k;document.getElementById('vTotal').textContent=t;document.getElementById('vKnown').textContent=k;document.getElementById('vRemain').textContent=r;document.getElementById('vPct').textContent=Math.round(k/t*100)+'%';document.getElementById('vProgress').style.width=(k/t*100)+'%';
  const tb=document.getElementById('vTableBody');tb.innerHTML=vFiltered().map((w,i)=>{const ik=vKnown.has(w.w);return`<tr style="background:${i===vIdx?'#1a3a5a':''}"><td>${w.w}</td><td>${w.m}</td><td class="${ik?'known':'unknown'}">${ik?'已掌握':'学习中'}</td></tr>`}).join('')
}
function vFlip(){document.getElementById('vCard').classList.toggle('flipped')}
function vMark(type){const f=vFiltered();if(!f.length)return;const w=f[vIdx%f.length];type==='known'?vKnown.add(w.w):vKnown.delete(w.w);vSave();vNext()}
function vNext(){const f=vFiltered();if(!f.length)return;vIdx=(vIdx+1)%f.length;vRender()}
function vPrev(){const f=vFiltered();if(!f.length)return;vIdx=(vIdx-1+f.length)%f.length;vRender()}
function vShuffle(){vWords=[...VWORDS].sort(()=>Math.random()-.5);vIdx=0;vFilterText='';document.getElementById('vSearch').value='';vRender()}
function vToggleList(){document.getElementById('vList').classList.toggle('show')}
function vReset(){if(confirm('确定要重置所有学习进度吗？')){vKnown.clear();vSave();vRender()}}
function vFilter(){vFilterText=document.getElementById('vSearch').value.toLowerCase();vIdx=0;vRender()}
document.addEventListener('keydown',e=>{if(mode!=='vocab'||e.target.tagName==='INPUT')return;if(e.key==='ArrowRight')vNext();if(e.key==='ArrowLeft')vPrev();if(e.key===' '){e.preventDefault();vFlip()}if(e.key==='1')vMark('unknown');if(e.key==='2')vMark('known')});

// Init
vRender();updateHPanel();
</script>
