/* ====== 刷真题样式 ====== */

.filter-btn{padding:7px 15px;border:none;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s;background:transparent;color:#888}

.exam-container{max-width:1100px;margin:16px auto;padding:0 20px;display:flex;gap:16px}

.section-link{display:block;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#888;transition:all .15s;margin-bottom:1px;text-decoration:none}

.card .passage-title{font-size:13px;color:#888;margin-bottom:16px}
.passage{font-family:'Times New Roman',serif;font-size:15px;line-height:2;color:#333;margin-bottom:20px;text-align:justify}
.passage p{margin-bottom:12px;text-indent:2em}
.passage .word{cursor:pointer;transition:all .15s;border-bottom:1px dashed transparent;position:relative}
.passage .word:hover{border-bottom-color:#2c5282;color:#2c5282}

.tooltip.show{opacity:1;transform:translateY(0)}
.tooltip .word-orig{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}

.sentence-popup.show{display:block}

.sp-btn{flex:1;padding:7px;border:1px solid #d0c8bc;border-radius:6px;background:#ffffff;cursor:pointer;font-size:12px;color:#555;transition:all .15s}
.sp-btn:hover{background:#e0d8cc;border-color:#2c5282;color:#2c5282}
/* 生词面板 */

.hp-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#2c5282;color:#fff;font-size:13px;font-weight:600}
.hp-toggle{background:none;border:none;color:#fff;font-size:16px;cursor:pointer}
.hp-list{padding:6px;overflow-y:auto;flex:1;max-height:220px}
.hp-list .hp-word{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;margin:2px 0;border-radius:5px;background:#f8f6f3;font-size:12px;cursor:pointer}
.hp-list .hp-word:hover{background:#e0d8cc}
.hp-list .hp-remove{color:#999;cursor:pointer;font-size:14px}
.hp-list .hp-remove:hover{color:#c44536}
.hp-actions{display:flex;gap:4px;padding:6px;border-top:1px solid #d0c8bc}
.hp-btn{flex:1;padding:5px;border:none;border-radius:5px;background:#f8f6f3;cursor:pointer;font-size:10px;color:#777;transition:all .15s}
.hp-btn:hover{background:#2c5282;color:#fff}

/* ====== 背单词样式 ====== */
.vocab-container{display:none;flex-direction:column;align-items:center;padding:20px}
.vocab-container.show{display:flex}
.vocab-stats{display:flex;gap:16px;margin:10px 0 16px;flex-wrap:wrap;justify-content:center}
.vocab-stat{background:#ffffff;border-radius:8px;padding:10px 20px;text-align:center;min-width:70px;border:1px solid #d0c8bc}

.vocab-progress{width:380px;max-width:90vw;height:3px;background:#ffffff;border-radius:2px;margin:0 auto 8px;overflow:hidden}
.vocab-progress-fill{height:100%;background:#2c5282;transition:width .3s}

.vocab-search input:focus{border-color:#2c5282}
.card-container{perspective:1000px;width:360px;max-width:90vw;height:260px;margin:8px auto 16px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.card-container.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card-front{background:linear-gradient(145deg,#ffffff,#1e3248);border:1px solid #d0c8bc}
.card-back{background:linear-gradient(145deg,#e8f0e8,#d0e0d0);border:1px solid #3a6a3a;transform:rotateY(180deg)}
.card-front .word{font-size:40px;font-weight:700;color:#333;letter-spacing:1px;margin-bottom:8px}
.card-front .hint{font-size:11px;color:#aaa;margin-top:16px}
.card-back .word{font-size:20px;color:#2e7d32;margin-bottom:12px}
.card-back .meaning{font-size:18px;color:#333;text-align:center;line-height:1.7}
.vocab-btns{display:flex;gap:10px;margin:8px 0 16px;flex-wrap:wrap;justify-content:center}
.vocab-btn{padding:8px 20px;border:none;border-radius:7px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:600}
.v-btn-red{background:#c44536;color:#fff}.v-btn-red:hover{background:#a0302a}
.v-btn-green{background:#2e7d32;color:#fff}.v-btn-green:hover{background:#1b5e20}

.vocab-list{width:100%;max-width:650px;margin:16px auto;display:none}
.vocab-list.show{display:block}
.vocab-list table{width:100%;border-collapse:collapse;font-size:13px}
.vocab-list th{background:#ffffff;padding:10px 14px;text-align:left;color:#2c5282;position:sticky;top:0}
.vocab-list td{padding:8px 14px;border-bottom:1px solid #ffffff}
.vocab-list tr:hover{background:#ffffff}

/* ====== 反馈弹窗 ====== */
#feedbackModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:99999;justify-content:center;align-items:center}

#feedbackModal .fb-cancel{background:#e8e4de;color:#888}
#feedbackModal .fb-submit{background:#2c5282;color:#fff}

/* 响应式 */
@media(max-width:768px){

  .exam-sidebar h3{display:none}
  .section-link{white-space:nowrap;flex-shrink:0}
  .card{padding:18px}
}

'2025-12':{writing:{title:'Part I Writing (30 minutes)',directions:'Write an essay on "Teachers are pivotal guides in students\' academic and personal growth". 150-200 words.',sample:'Teachers play a uniquely influential role that extends far beyond the transmission of academic knowledge. They serve simultaneously as mentors, role models, and guides who shape not only what students learn but who they become.\n\nIn the academic realm, a skilled teacher does more than deliver curriculum content. They ignite intellectual curiosity, teaching students how to think critically rather than what to think. The best teachers create environments where questions are welcomed, mistakes are viewed as learning opportunities, and intellectual growth is celebrated.\n\nBeyond academics, teachers profoundly influence personal development. They model integrity, perseverance, and empathy through their daily interactions. A teacher who genuinely listens to a struggling student, who offers encouragement during moments of doubt, can fundamentally alter that young person\'s self-perception and life trajectory.\n\nIn conclusion, teachers are far more than conveyors of information. They are architects of human potential whose influence ripples through generations.'},translation:{title:'Part IV Translation (30 minutes)',directions:'将以下段落翻译成英文',chinese:'尊老是中华民族的传统美德，深深植根于中国人的思想和行为中。在当今的中国，这种美德得到广泛传承。社会各界积极营造敬老助老的社会氛围，为老年人提供便利服务已成为社会共识。政府还出台了一系列政策，为老年人的权益提供有力保障。',english:'Respecting the elderly is a traditional virtue of the Chinese nation, deeply rooted in the thoughts and actions of the Chinese people. In contemporary China, this virtue continues to be widely upheld. All sectors of society actively foster a social atmosphere of honoring and assisting the elderly. The government has also issued a series of policies to provide robust guarantees for the rights and interests of the elderly.'},reading3:{title:'Section C: Careful Reading',passageTitle:'Passage One: Friendship and the Cult of Individual Achievement',passage:'Many see friendships as a comfort blanket: a shoulder to cry on, a reliable soul to confide in. However, more often than not, in our eagerness to seek individual success, we lose friends along the way and that has become part of the process. The chaos and never-ending turbulence that accompanies everyday life is an aggressive obstacle in the pursuit of stable friendships. As students, we use this excuse to shrug off losing people who we once thought to be loved ones. Instead of viewing our lives as a race, where everyone is on their own path to some form of success, we must relearn to value the connections we make along the track. We must reevaluate the harm of radical, individual freedom. Radical individualism elevates the freedom of the individual over the collective. It argues, for instance, that universal healthcare, an example of collectivism, threatened the dream of many Americans. Many of us have fallen victim to an individualistic culture. Society tends to celebrate personal achievement and commend it based on the assumption that winning or succeeding is a consequence of working harder than the next person. As a society, we idolize the concept of losing friends on the road to success. It is preached in many success stories, and it is embedded in the way we see growth. This constant need to succeed has blinded us from seeing through the whirlwind of change that accompanies our everyday lives. We cannot be complacent with losing friendships because they are our anchors. Put effort into fostering healthy relationships, and maintaining them through your busy schedule that seems like it leaves no time for anyone else.\n\nThe elevation of individual achievement above all else has deep roots in modern economic thinking. From an early age, we are taught that success results from personal effort and talent, and that our primary obligation is to maximize our own potential. This narrative, while empowering in some respects, has a dark side: it implicitly devalues the relationships and communities that make achievement meaningful.\n\nResearch increasingly suggests that the costs of this trade-off are severe. Studies have consistently found that strong social connections are among the strongest predictors of both psychological wellbeing and physical health. People with robust friendship networks live longer, recover faster from illness, and report higher levels of life satisfaction.\n\nThe challenge, then, is not to abandon ambition but to redefine it in more holistic terms. True success should be measured not merely by professional accomplishments but by the quality of our relationships and the depth of our contributions to the communities we inhabit. This requires a cultural shift—one that values connection as highly as competition.',questions:[{q:'What often happens when people are eager to pursue individual success?',opts:['A) They become more generous with their time','B) They form stronger community bonds','C) They work fewer hours for better life balance','D) They ignore their ties with friends'],ans:3},{q:'What does the author advise people to do in their pursuit of radical individualism?',opts:['A) Re-examine the detrimental effects','B) Embrace it more enthusiastically','C) Accept it as inevitable progress','D) Promote it in professional settings'],ans:0},{q:'What is American society\'s assumption of personal achievement?',opts:['A) It results from collective effort','B) It is primarily a matter of luck','C) It reflects a person\'s exceptional endeavor','D) It depends on social background'],ans:2},{q:'What is preached in many success stories?',opts:['A) Balancing work with personal relationships','B) Investing one\'s time in work instead of connecting with friends','C) Seeking help from family and community','D) Prioritizing mental health over career'],ans:1},{q:'What can we infer from the passage regarding the pursuit of success?',opts:['A) Individualism is the only path to achievement','B) Success has no relationship with social connections','C) Collectivism is superior to individualism','D) Professional success guarantees happiness'],ans:2}]},reading3b:{title:'Section C: Careful Reading',passageTitle:'Passage Two: Martin Luther King Jr. and Racial Equality',passage:'During his acceptance speech for the Nobel Peace Prize, Martin Luther King Jr. said, "I believe that unarmed truth and unconditional love will have the final word in reality." More than five decades later, our society is still struggling to separate truth from fantasy, fact from fiction. From disputes over climate change to debates about how slavery is taught, America is at a crossroads. And the battle for equity is at the heart of these vital conversations. Study after study shows that inequity has had appalling consequences. A 2020 report by Citi indicated that Black students could have increased their lifetime incomes by 90 to 113 billion dollars if equity issues related to higher education had been adequately addressed over the past two decades. This statistic represents a flood of issues we have failed to confront as a nation. However, by honoring King's legacy, we can get our country back on the path toward true equity. Students simply cannot understand the conflicts we have today without understanding what caused them in the first place. We have a responsibility to help them make connections between US history and current events. A recent survey found that 77 percent of Americans believe the nation is more divided than ever before. We are not living in a post-racial society. We simply cannot afford to keep our heads buried in the sand when it comes to racial inequity. On this Martin Luther King Day and beyond, let us commit to working together to disrupt the status quo and build a better, more inclusive nation. Decades after his assassination, King\'s words continue to resonate with unsettling relevance.\n\nDespite significant progress in civil rights legislation since King\'s era, racial inequality persists in deeply entrenched and often invisible forms. In education, Black students continue to face systemic disadvantages—from chronically underfunded schools in predominantly minority neighborhoods to disciplinary practices that disproportionately push students of color out of classrooms and into the criminal justice system.\n\nRecent national surveys paint a troubling picture. A growing majority of Americans now believe that the country has become increasingly divided along racial lines over the past two decades.\n\nBridging these persistent racial divides requires far more than passive goodwill. It demands what King himself called "the fierce urgency of now"—a genuine willingness to confront uncomfortable and deeply embedded truths about structural racism and to take concrete, measurable action to address them.',questions:[{q:'What does the author think about today\'s situation regarding racial equality?',opts:['A) It has been fully achieved in most areas','B) Racial issues are no longer relevant','C) It still has a long way to go before equity can be truly realized','D) The situation has improved beyond expectations'],ans:2},{q:'What do we learn about black students in the past 20 years?',opts:['A) They have been unfairly treated regarding higher education','B) They now outperform other groups academically','C) They receive more educational funding than before','D) They face no significant barriers to success'],ans:0},{q:'How can Americans bridge the differences that divide them?',opts:['A) By dealing with the thorny issues confronting them','B) By ignoring racial differences entirely','C) By focusing exclusively on economic growth','D) By eliminating all affirmative action programs'],ans:0},{q:'How do most Americans view America as a nation?',opts:['A) As more united than ever before','B) As a model of racial harmony','C) As a declining global power','D) It has become increasingly split'],ans:3},{q:'What does the author suggest Americans do?',opts:['A) Accept racial division as inevitable','B) Make joint efforts to tackle the nation\'s equity issues','C) Focus exclusively on individual achievement','D) Abandon all hope for racial progress'],ans:1}]}},
'2025-06':{writing:{title:'Part I Writing',directions:'Write an essay on ethical issues of artificial intelligence. 150-200 words.',sample:'AI ethics focuses on ensuring that artificial intelligence systems are developed and deployed in ways that respect human values, rights, and dignity. As AI systems become increasingly integrated into critical domains such as healthcare, criminal justice, and employment, the ethical implications grow more profound.\n\nOne central concern is algorithmic bias. AI systems trained on historical data may perpetuate and amplify existing societal prejudices, leading to discriminatory outcomes in hiring, lending, and law enforcement. Addressing this requires diverse training data, transparent algorithms, and rigorous testing for fairness.\n\nAnother critical issue is accountability. When an autonomous system makes a harmful decision, determining responsibility becomes complex. Is it the developer, the deploying organization, or the algorithm itself? Clear legal frameworks are needed to assign liability and ensure victims have recourse.\n\nPrivacy is equally pressing. AI systems often require vast amounts of personal data, raising concerns about consent, surveillance, and data security. Robust data protection regulations and privacy-preserving techniques like federated learning are essential safeguards.\n\nIn conclusion, while AI offers tremendous potential benefits, its ethical challenges demand proactive governance. Policymakers, technologists, and citizens must collaborate to ensure AI serves humanity\'s best interests.'},translation:{title:'Part IV Translation',directions:'将以下段落翻译成英文',chinese:'南水北调工程是一项跨区域配置水资源的宏大水利工程，分为东、中、西三条线路，总长4350公里，惠及人口将超过4亿。',english:'The South-to-North Water Diversion Project is a massive hydraulic engineering project for cross-regional water resource allocation, divided into eastern, central and western routes with a total length of 4,350 kilometers, benefiting over 400 million people.'},reading3:{title:'Section C: Careful Reading',passageTitle:'Passage One: School Absences and Academic Achievement',passage:'Nationally, one in six children miss 15 or more days of school in a year. Education officials have deplored all this missed instruction. These chronically absent students suffer academically because of all the classroom instruction they miss out on. In 2015, the U.S. secretary of education responded to this crisis, urging communities to support every student to attend every day and be successful in school. His open letter stated that missing 10 percent of school days in a year for any reason is a primary cause of low academic achievement. But what if America's attendance crisis is about much more than students missing class? What if, instead, it is a reflection of family and community crises these students face? As social scientists we investigated how excused and unexcused absences relate to children's academic achievement. We find that absences excused by a parent do little to harm children's learning. In fact, children with no unexcused absences but 15 to 18 excused absences have test scores equal to their peers who have no absences. Meanwhile, the average child with even just one unexcused absence does much worse academically than peers with none. We believe unexcused absence is a strong signal of the many challenges children and families face, including economic and medical hardships. Our evidence suggests unexcused absences are problematic, but for a different reason than people often think. Absence from school matters mainly as a signal of many crises children and their families may be facing. How we choose to think of school absences matters for educational policy. These attendance policies end up disproportionately punishing families dealing with out-of-school crises. We instead suggest using unexcused absence from school as a signal to channel resources to the children and families who need them most. The U.S. Secretary of Education recently issued an open letter declaring that low academic achievement is mainly attributed to school absences.\n\nResearchers examining this issue have made an important distinction between different types of absences. Excused absences—those for illness, medical appointments, or family emergencies—have been found to have little impact on children\'s learning. These necessary absences, while disruptive, do not significantly affect academic outcomes when properly managed.\n\nUnexcused absences, however, tell a very different story. These point directly to many of the out-of-school challenges confronting children and their families: poverty, housing instability, lack of transportation, and family stress. The authors argue that these absences reflect deeper socioeconomic problems that schools alone cannot solve.\n\nThe assumption underlying many education policies is that schools can boost children\'s academic performance by effective intervention. Yet the evidence on absenteeism suggests that directing resources to helping needy children—addressing the root causes that keep them out of school—may be more effective than focusing exclusively on what happens inside the classroom.',questions:[{q:'What does the U.S. secretary of education say?',opts:['A) Schools need more federal funding','B) Teacher quality is most important','C) Low academic achievement is mainly attributed to school absences','D) Standardized testing should be eliminated'],ans:2},{q:'What do the authors find about school absences?',opts:['A) Excused absences have little impact on children\'s learning','B) All types of absences are equally harmful','C) Absences only affect high school students','D) The impact of absences has been exaggerated'],ans:0},{q:'What do unexcused absences point to?',opts:['A) Student laziness and poor attitude','B) Out-of-school challenges confronting children and their families','C) Easy solutions through stricter policies','D) No relationship with socioeconomic factors'],ans:1},{q:'What is the assumption underlying U.S. education policies?',opts:['A) All students learn at the same pace','B) Schools can boost academic performance by effective intervention','C) Teachers should not be held accountable','D) Education funding has no impact on outcomes'],ans:1},{q:'What do the authors suggest regarding school absences?',opts:['A) Implementing stricter punishment for truant students','B) Focusing exclusively on classroom instruction','C) Directing resources to helping needy children','D) Lowering the compulsory education age'],ans:2}]},reading3b:{title:'Section C: Careful Reading',passageTitle:'Passage Two: The Passion Principle and Career Choice',passage:'After earning a bachelor\'s degree, I was determined to do what I love. For almost a decade after, I advised people to follow the same path—do whatever you are zealous for, and the rest will follow. This advice felt righteous and inspiring.\n\nBut through years of research, I was struck by the broad popularity of this "passion principle" across all segments of society. Everyone, it seemed, believed that passion should guide career choice. And yet, the more I examined the evidence, the more I realized how deeply flawed this advice actually is.\n\nThe uncomfortable truth is that turning one\'s passion into a stable, good-paying job requires something beyond enthusiasm: financial backing and social connections. Those from privileged backgrounds can afford to pursue their passions because they have safety nets. For everyone else, following passion without adequate resources often leads to frustration and economic precarity.\n\nWhen everyone is encouraged to follow their passion, socioeconomic inequality is likely to persist and even deepen. The passion narrative masks structural barriers behind an appealing story of individual choice. Perhaps most troubling, employers of passionate workers often exploit these workers\' passion to benefit themselves—demanding longer hours and lower pay under the guise of "doing what you love."',questions:[{q:'What did the author advise people to do for almost a decade?',opts:['A) Pursue high-paying careers regardless of interest','B) Choose stable government jobs for security','C) Prioritize work-life balance above all else','D) Do whatever they are zealous for'],ans:3},{q:'How did the author feel about the passion principle through his research?',opts:['A) He found it was only popular among wealthy people','B) He discovered it had no real-world applications','C) He was disappointed that few people followed it','D) He was struck by its broad popularity'],ans:3},{q:'What is important to turning passion into a stable, good-paying job?',opts:['A) Natural talent and creative ability','B) Hard work and unwavering determination','C) A college degree from a prestigious university','D) Financial backing and social connections'],ans:3},{q:'What happens when everyone is encouraged to follow their passion?',opts:['A) More people find genuine fulfillment','B) The economy becomes more innovative','C) Socioeconomic inequality is likely to persist','D) Traditional career paths become obsolete'],ans:2},{q:'What does the author say about employers of passionate workers?',opts:['A) They are more likely to provide fair compensation','B) They exploit these workers\' passion to benefit themselves','C) They invest more in employee training','D) They create better working environments'],ans:1}]}}
}};

function renderPassageWithClickableWords(text){
  if(!text)return'';
  return text.split(/([a-zA-Z]+(?:[-'][a-zA-Z]+)*)/).map(part=>{
    if(/^[a-zA-Z]/.test(part)&&part.length>=2){return`<span class="word" data-word="${part}">${part}</span>`}
    return part.replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }).join('')
}

async function translateWord(word){
  const clean=word.toLowerCase().replace(/[^a-z-]/g,'');
  if(!clean||clean.length<2)return null;
  if(LOCAL_DICT[clean])return{word:clean,meaning:LOCAL_DICT[clean]};
  if(DICT_CACHE[clean])return DICT_CACHE[clean];
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(clean)}`);
    const d=await r.json();const zh=(d[0]||[]).map(x=>x[0]).join('').trim();
    if(zh&&zh!==clean){const res={word:clean,meaning:zh};DICT_CACHE[clean]=res;return res}
  }catch(e){}
  return null
}

function showTooltip(e,data){
  if(!data)return;ttWord.textContent=data.word;ttMeaning.textContent=data.meaning;
  tooltip.classList.add('show');tooltip.style.left=Math.min(e.clientX+16,window.innerWidth-270)+'px';tooltip.style.top=Math.min(e.clientY-10,window.innerHeight-80)+'px'
}
function hideTooltip(){tooltip.classList.remove('show')}

function toggleHighlight(word,el){
  const key=word.toLowerCase();
  if(highlightedWords[key]){delete highlightedWords[key];el.classList.remove('highlighted')}
  else{highlightedWords[key]=word;el.classList.add('highlighted')}
  localStorage.setItem('cet_highlights',JSON.stringify(highlightedWords));updateHPanel()
}

function updateHPanel(){
  const list=document.getElementById('hpList'),words=Object.keys(highlightedWords);
  document.getElementById('hpCount').textContent=`(${words.length})`;
  list.innerHTML=words.map(w=>`<div class="hp-word"><span>${highlightedWords[w]}</span><span class="hp-remove" onclick="event.stopPropagation();removeHL('${w}')">×</span></div>`).join('')||'<div style="color:#888;font-size:11px;padding:8px;text-align:center">点击文章中的单词来添加生词</div>'
}
function removeHL(key){delete highlightedWords[key];localStorage.setItem('cet_highlights',JSON.stringify(highlightedWords));updateHPanel();renderAll()}
function clearHighlights(){highlightedWords={};localStorage.removeItem('cet_highlights');updateHPanel();renderAll()}
function exportWordList(){
  const w=Object.entries(highlightedWords).map(([k,v])=>`${v}`).join('\n');
  const b=new Blob([w],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='生词本.txt';a.click()
}

async function translateSentence(text){
  const clean=text.trim().replace(/\s+/g,' ');if(!clean||clean.length<5)return;
  spOriginal.textContent=clean;spTranslated.textContent='翻译中...';sentencePopup.classList.add('show');lastSelectedText=clean;
  try{const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(clean)}`);const d=await r.json();spTranslated.textContent=d[0].map(x=>x[0]).join('')}
  catch(e){spTranslated.textContent='网络错误，请检查连接'}
}
function closeSentencePopup(){sentencePopup.classList.remove('show')}
function speakSentence(){if(!lastSelectedText)return;const u=new SpeechSynthesisUtterance(lastSelectedText);u.lang='en-US';u.rate=.9;speechSynthesis.speak(u)}
function copySentence(){navigator.clipboard.writeText(spTranslated.textContent).then(()=>{const b=document.querySelector('.sp-btn:last-child');b.textContent='已复制!';setTimeout(()=>b.textContent='复制译文',1500)})}

function renderSection(sectionKey){
  const data=EXAM_DATA[state.examType][state.year];if(!data)return'<div class="card"><p>暂无该年份真题数据</p></div>';
  const section=data[sectionKey];if(!section)return'<div class="card"><p>暂无该部分数据</p></div>';
  let html='';
  if(sectionKey==='writing'){
    html+=`<div class="card"><h2>${section.title}</h2><p style="color:#c44536;font-weight:600;margin-bottom:16px">${section.directions}</p><p style="font-weight:700;margin:14px 0 8px;color:#2c5282">参考范文：</p><div class="passage">${section.sample.split('\n\n').map(p=>`<p>${renderPassageWithClickableWords(p)}</p>`).join('')}</div></div>`
  }else if(sectionKey==='translation'){
    html+=`<div class="card"><h2>${section.title}</h2><p style="color:#c44536;font-weight:600;margin-bottom:16px">${section.directions}</p><div style="background:#f8f6f3;padding:16px;border-radius:8px;margin-bottom:16px"><p style="font-weight:700;color:#2c5282;margin-bottom:6px">中文原文：</p><p style="font-size:15px;line-height:2">${section.chinese}</p></div>`;
    if(state.showAnswers){html+=`<div style="background:#e8f0e8;padding:16px;border-radius:8px"><p style="font-weight:700;color:#2e7d32;margin-bottom:6px">参考译文：</p><p style="font-size:14px;line-height:2">${renderPassageWithClickableWords(section.english)}</p></div>`}
    html+=`<button class="btn-toggle-answer" onclick="toggleAnswers()">${state.showAnswers?'隐藏译文':'显示参考译文'}</button></div>`
  }else if(sectionKey==='reading3'||sectionKey==='reading3b'){
    html+=`<div class="card"><h2>${section.title}</h2><p class="passage-title">${section.passageTitle}</p><div class="passage">${section.passage.split('\n\n').map(p=>`<p>${renderPassageWithClickableWords(p)}</p>`).join('')}</div><div class="questions"><h3 style="margin-bottom:10px">Questions:</h3>`;
    section.questions.forEach((q,qi)=>{html+=`<div class="question"><p class="q-text"><span class="q-num">${qi+1}.</span>${q.q}</p><div class="options">${q.opts.map((o,oi)=>{let cls='option';if(state.showAnswers&&oi===q.ans)cls+=' correct';return`<div class="${cls}">${o}</div>`}).join('')}</div></div>`});
    html+=`</div><button class="btn-toggle-answer" onclick="toggleAnswers()">${state.showAnswers?'隐藏答案':'显示答案'}</button>`;
    if(state.showAnswers){html+=`<div style="margin-top:12px;padding:12px 16px;background:#e8f0e8;border-radius:8px"><span style="font-weight:700;color:#2e7d32">参考答案：</span><br>`;section.questions.forEach((q,qi)=>{html+=`第${qi+1}题: ${String.fromCharCode(65+q.ans)}<br>`});html+=`</div>`}
    html+=`</div>`
  }
  return html
}

function renderAll(){
  document.getElementById('examMain').innerHTML=renderSection(state.section);
  document.querySelectorAll('.word').forEach(el=>{
    const word=el.dataset.word;if(!word)return;
    if(highlightedWords[word.toLowerCase()])el.classList.add('highlighted');
    el.addEventListener('mouseenter',async(e)=>{el.classList.add('highlight');const data=await translateWord(word);showTooltip(e,data)});
    el.addEventListener('mouseleave',()=>{el.classList.remove('highlight');hideTooltip()});
    el.addEventListener('click',(e)=>{e.stopPropagation();toggleHighlight(word,el)})
  });
  updateHPanel()
}

function toggleAnswers(){state.showAnswers=!state.showAnswers;renderAll()}

document.querySelectorAll('#yearFilter .filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#yearFilter .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.year=btn.dataset.year;state.showAnswers=false;renderAll()})});
document.querySelectorAll('#sidebarNav .section-link').forEach(link=>{link.addEventListener('click',(e)=>{e.preventDefault();document.querySelectorAll('#sidebarNav .section-link').forEach(l=>l.classList.remove('active'));link.classList.add('active');state.section=link.dataset.section;state.showAnswers=false;renderAll()})});
document.addEventListener('dblclick',(e)=>{const sel=window.getSelection().toString().trim();if(sel&&sel.split(' ').length>=2)translateSentence(sel)});
document.addEventListener('click',(e)=>{if(!e.target.closest('.word'))hideTooltip()});
document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){closeSentencePopup();hideTooltip()}});
document.getElementById('feedbackModal').addEventListener('click',function(e){if(e.target===this)closeFeedback()});

function openFeedback(){document.getElementById('feedbackModal').style.display='flex'}
function closeFeedback(){document.getElementById('feedbackModal').style.display='none';document.getElementById('fbMsg').style.display='none'}
function submitFeedback(){
  const text=document.getElementById('fbText').value.trim();if(!text)return;
  const issues=JSON.parse(localStorage.getItem('cet_feedback')||'[]');
  issues.push({text,time:new Date().toISOString(),page:state.section,year:state.year});
  localStorage.setItem('cet_feedback',JSON.stringify(issues));document.getElementById('fbText').value='';
  const msg=document.getElementById('fbMsg');msg.style.display='block';msg.style.color='#2e7d32';msg.textContent='已保存！感谢反馈（共'+issues.length+'条）';setTimeout(closeFeedback,1500)
}

let vWords=[...VWORDS],vIdx=0,vKnown=new Set(JSON.parse(localStorage.getItem('cet6_vknow')||'[]')),vFilterText='';

function vSave(){localStorage.setItem('cet6_vknow',JSON.stringify([...vKnown]))}
function vFiltered(){return vFilterText?vWords.filter(w=>w.w.toLowerCase().includes(vFilterText)||w.m.includes(vFilterText)):vWords}
function vRender(){
  const f=vFiltered();if(!f.length){document.getElementById('vWord').textContent='无结果';return}
  const w=f[vIdx%f.length];document.getElementById('vWord').textContent=w.w;document.getElementById('vWordBack').textContent=w.w;document.getElementById('vMeaning').textContent=w.m;
  document.getElementById('vCard').classList.remove('flipped');vUpdateStats()
}
function vUpdateStats(){
  const t=vWords.length,k=vKnown.size,r=t-k;document.getElementById('vTotal').textContent=t;document.getElementById('vKnown').textContent=k;document.getElementById('vRemain').textContent=r;document.getElementById('vPct').textContent=Math.round(k/t*100)+'%';document.getElementById('vProgress').style.width=(k/t*100)+'%';
  const tb=document.getElementById('vTableBody');tb.innerHTML=vFiltered().map((w,i)=>{const ik=vKnown.has(w.w);return`<tr style="background:${i===vIdx?'#1a3a5a':''}"><td>${w.w}</td><td>${w.m}</td><td class="${ik?'known':'unknown'}">${ik?'已掌握':'学习中'}</td></tr>`}).join('')
}
function vFlip(){document.getElementById('vCard').classList.toggle('flipped')}
function vMark(type){const f=vFiltered();if(!f.length)return;const w=f[vIdx%f.length];type==='known'?vKnown.add(w.w):vKnown.delete(w.w);vSave();vNext()}
function vNext(){const f=vFiltered();if(!f.length)return;vIdx=(vIdx+1)%f.length;vRender()}
function vPrev(){const f=vFiltered();if(!f.length)return;vIdx=(vIdx-1+f.length)%f.length;vRender()}
function vShuffle(){vWords=[...VWORDS].sort(()=>Math.random()-.5);vIdx=0;vFilterText='';document.getElementById('vSearch').value='';vRender()}
function vToggleList(){document.getElementById('vList').classList.toggle('show')}
function vReset(){if(confirm('确定要重置所有学习进度吗？')){vKnown.clear();vSave();vRender()}}
function vFilter(){vFilterText=document.getElementById('vSearch').value.toLowerCase();vIdx=0;vRender()}
document.addEventListener('keydown',e=>{if(mode!=='vocab'||e.target.tagName==='INPUT')return;if(e.key==='ArrowRight')vNext();if(e.key==='ArrowLeft')vPrev();if(e.key===' '){e.preventDefault();vFlip()}if(e.key==='1')vMark('unknown');if(e.key==='2')vMark('known')});

// Init
vRender();updateHPanel();
