async function translateWord(word) {
  const clean = word.toLowerCase().replace(/[^a-z-]/g, '');
  if (!clean || clean.length < 2) return null;

  if (LOCAL_DICT[clean]) return {word: clean, meaning: LOCAL_DICT[clean]};
  if (DICT_CACHE[clean]) return DICT_CACHE[clean];

  const result = {word: clean, meaning: '翻译中...'};
  DICT_CACHE[clean] = result;

  // 尝试1: Google翻译
  try {
    const resp = await fetch(
      `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(clean)}`
    );
    const data = await resp.json();
    const zh = (data[0]||[]).map(x=>x[0]).join('').trim();
    if (zh && zh !== clean && !zh.startsWith('{')) {
      result.meaning = zh; return result;
    }
  } catch(e) {}

  // 尝试2: MyMemory (有日限额，超限返回英文原文)
  try {
    const resp = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(clean)}&langpair=en|zh-CN`
    );
    const data = await resp.json();
    const zh = data.responseData?.translatedText?.trim()||'';
    const match = data.responseData?.match||0;
    if (zh && zh !== clean.toUpperCase() && zh !== clean && match > 0) {
      result.meaning = zh; return result;
    }
  } catch(e) {}

  // 尝试3: 本地词典做最终兜底
  if (LOCAL_DICT[clean]) { result.meaning = LOCAL_DICT[clean]; return result; }

  // 全失败
  delete DICT_CACHE[clean];
  return {word: clean, meaning: '未收录（双击句子可翻译整句）'};
}

function toggleHighlight(word, el) {
  const key = word.toLowerCase();
  if (highlightedWords[key]) {
    delete highlightedWords[key];
    el.classList.remove('highlighted');
  } else {
    highlightedWords[key] = word;
    el.classList.add('highlighted');
  }
  localStorage.setItem('cet_highlights', JSON.stringify(highlightedWords));
  updateHighlightPanel();
}

function updateHighlightPanel() {
  const list = document.getElementById('hpList');
  const count = document.getElementById('hpCount');
  const words = Object.keys(highlightedWords);
  count.textContent = `(${words.length})`;
  list.innerHTML = words.map(w =>
    `<div class="hp-word" onclick="scrollToWord('${w}')">
      <span>${highlightedWords[w]}</span>
      <span class="hp-remove" onclick="event.stopPropagation();removeHighlight('${w}')">×</span>
    </div>`
  ).join('') || '<div style="color:#aaa;font-size:12px;padding:10px;text-align:center">点击文章中的单词来添加生词</div>';
}

function removeHighlight(key) { delete highlightedWords[key]; localStorage.setItem('cet_highlights',JSON.stringify(highlightedWords)); updateHighlightPanel(); renderAll(); }
function clearHighlights() { highlightedWords = {}; localStorage.removeItem('cet_highlights'); updateHighlightPanel(); renderAll(); }
function toggleHighlightPanel() { highlightPanel.classList.toggle('collapsed'); }

function exportWordList() {
  const words = Object.entries(highlightedWords).map(([k,v]) => `${v}: ${LOCAL_DICT[k]||'未收录'}`).join('\n');
  const blob = new Blob([words], {type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '生词本.txt'; a.click();
}

async function translateSentence(text) {
  const clean = text.trim().replace(/\s+/g,' ');
  if (!clean || clean.length < 5) return;
  spOriginal.textContent = clean;
  spTranslated.textContent = '翻译中...';
  sentencePopup.classList.add('show');
  lastSelectedText = clean;

  // Google 翻译（主）
  try {
    const resp = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(clean)}`);
    const data = await resp.json();
    const result = data[0]?.map(x => x[0]).join('') || '';
    if (result && result !== clean) {
      spTranslated.textContent = result; return;
    }
  } catch(e) {}
  // 备用 MyMemory
  try {
    const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(clean)}&langpair=en|zh-CN`);
    const data = await resp.json();
    spTranslated.textContent = data.responseData?.translatedText || '翻译失败，请稍后重试';
  } catch(e) {
    spTranslated.textContent = '网络错误，请检查连接';
  }
}

function closeSentencePopup() { sentencePopup.classList.remove('show'); }
function speakSentence() {
  if (!lastSelectedText) return;
  const u = new SpeechSynthesisUtterance(lastSelectedText);
  u.lang = 'en-US'; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function copySentence() {
  navigator.clipboard.writeText(spTranslated.textContent).then(()=>{
    const btn = document.querySelector('.sp-btn:last-child');
    btn.textContent='已复制!'; setTimeout(()=>btn.textContent='复制译文',1500);
  });
}

// ======================== 渲染层 ========================
function renderPassageWithClickableWords(text) {
  if (!text) return '';
  // 匹配所有英文单词（含缩写don't, state-of-the-art等）
  return text.split(/([a-zA-Z]+(?:[-'][a-zA-Z]+)*)/).map(part => {
    if (/^[a-zA-Z]/.test(part) && part.length >= 2) {
      return `<span class="word" data-word="${part}">${part}</span>`;
    }
    return part.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }).join('');
}

      html += `<div class="answer-box show"><span class="ans-label">参考答案：</span><br>`;
      section.questions.forEach((q, qi) => {
        html += `第${qi+1}题: ${String.fromCharCode(65+q.ans)}<br>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  // 长篇阅读（匹配）
  else if (sectionKey === 'reading2') {
    html += `<div class="card">
      <h2>${section.title}</h2>
      <p class="passage-title">${section.passageTitle}</p>
      <div class="passage" style="font-size:14px">${section.passage.split('\n\n').map(p => `<p>${renderPassageWithClickableWords(p)}</p>`).join('')}</div>
      <div class="questions"><h3 style="margin:20px 0 12px">Statements:</h3>`;
    section.statements.forEach((s, si) => {
      html += `<div class="question">
        <p class="q-text"><span class="q-num">${si+1}.</span>${s}</p>
        ${state.showAnswers ? `<p style="color:#2e7d32;font-weight:600;margin-top:6px">→ Paragraph ${section.answers[si]}</p>` : ''}
      </div>`;
    });
    html += `</div>`;
    html += `<button class="btn-toggle-answer" onclick="toggleAnswers()">${state.showAnswers ? '隐藏答案' : '显示答案'}</button></div>`;
  }

  // 翻译
  else if (sectionKey === 'translation') {
    html += `<div class="card">
      <h2>${section.title}</h2>
      <p style="color:#e67e22;font-weight:600;margin-bottom:20px">${section.directions}</p>
      <div style="background:#fafbfc;padding:20px;border-radius:8px;margin-bottom:20px">
        <p style="font-weight:700;color:#1a73e8;margin-bottom:8px">中文原文：</p>
        <p style="font-size:16px;line-height:2">${section.chinese}</p>
      </div>`;
    if (state.showAnswers) {
      html += `<div style="background:#e8f5e9;padding:20px;border-radius:8px">
        <p style="font-weight:700;color:#2e7d32;margin-bottom:8px">参考译文：</p>
        <p style="font-size:15px;line-height:2">${renderPassageWithClickableWords(section.english)}</p>
      </div>`;
    }
    html += `<button class="btn-toggle-answer" style="margin-top:12px" onclick="toggleAnswers()">${state.showAnswers ? '隐藏译文' : '显示参考译文'}</button></div>`;
  }

  else {
    html += `<div class="card"><h2>${section.title||sectionKey}</h2><p>内容加载中...</p></div>`;
  }

  return html;
}

function renderAll() {
  document.getElementById('mainContent').innerHTML = renderSection(state.section);

  // 绑定单词事件
  document.querySelectorAll('.word').forEach(el => {
    const word = el.dataset.word;
    if (!word) return;

    // 恢复高亮
    if (highlightedWords[word.toLowerCase()]) {
      el.classList.add('highlighted');
    }

    // 悬停不再翻译，仅显示可点击样式
    el.addEventListener('mouseenter', () => {
      el.classList.add('highlight');
    });
    el.addEventListener('mouseleave', () => {
      el.classList.remove('highlight');
      hideTooltip();
    });

    // 点击翻译+高亮
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const data = await translateWord(word);
      showTooltip(e, data);
      toggleHighlight(word, el);
    });
  });

  // 恢复高亮面板
  updateHighlightPanel();
}

function toggleAnswers() {
  state.showAnswers = !state.showAnswers;
  renderAll();
}

// ======================== 事件绑定 ========================
document.querySelectorAll('#examTypeFilter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#examTypeFilter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.examType = btn.dataset.type;
    state.showAnswers = false;
    renderAll();
  });
});

document.querySelectorAll('#yearFilter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#yearFilter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.year = btn.dataset.year;
    state.showAnswers = false;
    renderAll();
  });
});

document.querySelectorAll('#sidebarNav .section-link').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('#sidebarNav .section-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    state.section = link.dataset.section;
    state.showAnswers = false;
    renderAll();
  });
});

// 点击空白处关闭tooltip
document.addEventListener('click', (e) => {
  if (!e.target.closest('.word')) hideTooltip();
});

// ESC关闭句子翻译弹窗
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeSentencePopup();
    hideTooltip();
  }
});

// 初始渲染
renderAll();
</script>
</body>
</html>
